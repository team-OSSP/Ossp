<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hand Spark - 레벨 선택</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
  <style>
    /* ── 레벨 선택 전용 스타일 ── */

    /* 페이지 제목 영역 */
    .level-header-section {
      padding: 32px 0;
      text-align: center;
    }

    .level-header-section h2 {
      font-size: 36px;
      font-weight: 900;
      line-height: 1.3;
      margin-bottom: 8px;
    }

    .level-header-section p {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.6;
    }

    /* 카드 그리드: 기본은 1열, 화면이 넓으면 3열 */
    .level-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media (min-width: 768px) {
      .level-header-section {
        text-align: left;
      }
      .level-grid {
        grid-template-columns: 1fr 1fr 1fr;
      }
    }

    /* 레벨 카드 */
    .level-card {
      text-align: left;
      padding: 32px;
      display: flex;
      flex-direction: column;
      align-items: center; 
      background-color: #ffffff;
      border: 2px solid #000000;
      cursor: pointer;
      font-family: 'Noto Sans', sans-serif;
      transition: border 0.1s;
    }

    @media (min-width: 768px) {
      .level-card {
        align-items: flex-start;
      }
    }

    /* 선택된 카드: 빨간 두꺼운 테두리 */
    .level-card.selected {
      border: 6px solid #D32F2F;
    }

    /* 카드 안 이모지 박스 */
    .level-emoji-box {
      width: 100px;
      height: 100px;
      border: 2px solid #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      margin-bottom: 24px;
    }

    /* 레벨 번호 + 별 한 줄 */
    .level-top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 8px;
    }

    .level-number {
      font-size: 22px;
      font-weight: 900;
      text-transform: uppercase; /* 소문자를 대문자로 */
      letter-spacing: 0.1em;
    }

    .level-stars {
      display: flex;
      gap: 4px;
    }

    /* 채워진 별 */
    .star-on {
      font-size: 24px;
      color: #000000;
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    /* 빈 별 */
    .star-off {
      font-size: 24px;
      color: #d0d0d0;
    }

    .level-name {
      font-size: 28px;
      font-weight: 900;
      margin-bottom: 12px;
    }

    .level-desc {
      font-size: 20px;
      font-weight: 500;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    /* 카드 하단 예시 영역 */
    .level-examples {
      border-top: 2px solid #000000;
      padding-top: 16px;
      width: 100%;
    }

    .example-title {
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .example-list {
      font-size: 20px;
      font-weight: 500;
    }

    /* 시작 버튼 */
    .start-section {
      margin-top: 48px;
      display: flex;
      justify-content: center;
    }

    .btn-start {
      min-width: 300px;
      height: 80px;
      background-color: #D32F2F;
      color: #ffffff;
      border: 2px solid #D32F2F;
      font-family: 'Noto Sans', sans-serif;
      font-size: 28px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      cursor: pointer;
    }

    .btn-start:active {
      background-color: #9a2222;
    }
  </style>
</head>
<body>

  <!-- 상단 헤더 -->
  <header class="page-header">
    <div class="header-left">
      <button class="icon-btn" onclick="history.back()">
        <span class="material-symbols-outlined">arrow_back</span>
      </button>
      <span class="header-title">Hand Spark</span>
    </div>
    <div class="header-right">
      <button class="icon-btn">
        <span class="material-symbols-outlined">settings</span>
      </button>
      <button class="icon-btn">
        <span class="material-symbols-outlined">help</span>
      </button>
    </div>
  </header>

  <!-- 메인 콘텐츠 -->
  <main class="page-main">

    <!-- 페이지 제목 -->
    <section class="level-header-section">
      <h2>단계를 선택하세요</h2>
    </section>

    <!-- 레벨 카드 3개 -->
    <div class="level-grid">

      <!-- Lv.1 -->
      <button class="level-card" onclick="selectLevel(1)">
        <div class="level-emoji-box">👊</div>
        <div class="level-top-row">
          <span class="level-number">Lv.1</span>
          <div class="level-stars">
            <span class="material-symbols-outlined star-on">star</span>
            <span class="material-symbols-outlined star-off">star</span>
            <span class="material-symbols-outlined star-off">star</span>
          </div>
        </div>
        <h3 class="level-name">한 손 기초</h3>
        <p class="level-desc">한 손으로 간단한 손 모양 만들기</p>
        <div class="level-examples">
          <p class="example-title">연습 예시:</p>
          <p class="example-list">주먹, 손바닥, 엄지척, OK</p>
        </div>
      </button>

      <!-- Lv.2 (기본 선택) -->
      <button class="level-card selected" onclick="selectLevel(2)">
        <div class="level-emoji-box">🤙</div>
        <div class="level-top-row">
          <span class="level-number">Lv.2</span>
          <div class="level-stars">
            <span class="material-symbols-outlined star-on">star</span>
            <span class="material-symbols-outlined star-on">star</span>
            <span class="material-symbols-outlined star-off">star</span>
          </div>
        </div>
        <h3 class="level-name">한 손 심화</h3>
        <p class="level-desc">조금 더 어려운 손 모양에 도전!</p>
        <div class="level-examples">
          <p class="example-title">연습 예시:</p>
          <p class="example-list">락사인, 총모양, 새끼손가락</p>
        </div>
      </button>

      <!-- Lv.3 -->
      <button class="level-card" onclick="selectLevel(3)">
        <div class="level-emoji-box">🙌</div>
        <div class="level-top-row">
          <span class="level-number">Lv.3</span>
          <div class="level-stars">
            <span class="material-symbols-outlined star-on">star</span>
            <span class="material-symbols-outlined star-on">star</span>
            <span class="material-symbols-outlined star-on">star</span>
          </div>
        </div>
        <h3 class="level-name">양손 조합</h3>
        <p class="level-desc">양손으로 서로 다른 모양 만들기</p>
        <div class="level-examples">
          <p class="example-title">연습 예시:</p>
          <p class="example-list">왼손 주먹 + 오른손 손바닥</p>
        </div>
      </button>

    </div>

    <!-- 시작 버튼 -->
    <div class="start-section">
      <button class="btn-start" onclick="startGame()">
        시작하기
        <span class="material-symbols-outlined" style="font-size: 36px;">play_circle</span>
      </button>
    </div>

  </main>

  <!-- 하단 네비게이션 -->
  <nav class="bottom-nav">
    <a href="home.html" class="nav-item">
      <span class="material-symbols-outlined">home</span>
      <span class="nav-label">홈</span>
    </a>
    <a href="level.html" class="nav-item active">
      <span class="material-symbols-outlined icon-filled">exercise</span>
      <span class="nav-label">레벨 선택</span>
    </a>
    <a href="result.html" class="nav-item">
      <span class="material-symbols-outlined">analytics</span>
      <span class="nav-label">기록</span>
    </a>
  </nav>

  <script>
    var selectedLevel = Number(localStorage.getItem('handSparkLevel')) || 2;

    // 카드 클릭 시 선택 표시 변경
    function selectLevel(selectedNum) {
      selectedLevel = selectedNum;
      localStorage.setItem('handSparkLevel', String(selectedNum));
      var cards = document.querySelectorAll('.level-card');
      cards.forEach(function(card, index) {
        if (index + 1 === selectedNum) {
          card.classList.add('selected');
        } else {
          card.classList.remove('selected');
        }
      });
    }

    function startGame() {
      localStorage.setItem('handSparkLevel', String(selectedLevel));
      window.location.href = 'game.html?level=' + selectedLevel;
    }

    selectLevel(selectedLevel);
  </script>

</body>
</html>
